<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>churrasquinho-cardapio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,600;0,700;0,800;0,900;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script defer src="/_vercel/insights/script.js"></script>
</head>
<body>

  <header id="header"></header>
  <main   id="main"></main>

  <nav id="bottom-nav">
    <div class="cart-wrap">
      <button id="cart-btn">🛒</button>
      <span   id="cart-count" class="hidden">0</span>
    </div>
  </nav>

  <div id="modal-overlay"  class="overlay hidden"></div>
  <div id="cart-overlay"   class="overlay hidden"></div>
  <div id="opcoes-overlay" class="overlay hidden"></div>
  <div id="toast"></div>

  <!--
    Ordem de carregamento (cada arquivo depende dos anteriores):
    1. sections.js          → SECTIONS  (registry de seções)
    2. config.js            → CONFIG    (WhatsApp, PIX)
    3. utils.js             → funções puras
    4. render.js            → construtores de DOM
    5. modal.js             → modais de detalhe e opções
    6. cart.js              → estado e UI do carrinho
    7. whatsapp-message.js  → template e envio da mensagem
    8. main.js              → fetch JSONs → init
  -->
  <script src="data/sections.js"></script>
  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/render.js"></script>
  <script src="js/modal.js"></script>
  <script src="js/cart.js"></script>
  <script src="whatsapp-message.js"></script>
  <script src="js/main.js"></script>

</body>
</html>
