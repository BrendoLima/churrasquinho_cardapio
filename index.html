<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>churrasquinho-cardapio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Header: logo + abas de navegação (preenchido pelo JS) -->
  <header id="header"></header>

  <!-- Todo o conteúdo renderizado de uma vez para navegação por scroll -->
  <main id="main"></main>

  <!-- Botão flutuante do carrinho -->
  <nav id="bottom-nav">
    <div class="cart-wrap">
      <button id="cart-btn">🛒</button>
      <span   id="cart-count" class="hidden">0</span>
    </div>
  </nav>

  <!-- Overlays (modal de detalhe, carrinho, opções) -->
  <div id="modal-overlay"  class="overlay hidden"></div>
  <div id="cart-overlay"   class="overlay hidden"></div>
  <div id="opcoes-overlay" class="overlay hidden"></div>

  <!-- Toast de feedback ao adicionar item -->
  <div id="toast"></div>

  <!--
    Ordem de carregamento obrigatória:
    1. data-especiais.js  → var DATA_ESPECIAIS
    2. data-porcoes.js    → var DATA_PORCOES
    3. data-churrasco.js  → var DATA_CHURRASCO  (únicos cards wide)
    4. data-bebidas.js    → var DATA_BEBIDAS
    5. data-alcool.js     → var DATA_ALCOOL
    6. data.js            → monta var CARDAPIO = [DATA_ESPECIAIS, ...]
    7. app.js             → usa CARDAPIO para montar a interface
  -->
  <script src="data-especiais.js"></script>
  <script src="data-porcoes.js"></script>
  <script src="data-churrasco.js"></script>
  <script src="data-bebidas.js"></script>
  <script src="data-alcool.js"></script>
  <script src="data.js"></script>
  <script src="app.js"></script>
  <script src="whatsapp-message.js"></script>

</body>
</html>
