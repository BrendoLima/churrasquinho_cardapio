<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>churrasquinho-cardapio</title>

  <!-- Google Fonts: Nunito -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,600;0,700;0,800;0,900;1,400&display=swap">

  <!--
    CSS modular — ordem importa:
      1. tokens.css     variáveis de design (cores, pesos, raios)
      2. reset.css      normalização e body
      3. animations.css keyframes reutilizáveis
      4. layout.css     header, nav e estrutura de seções
      5. cards.css      card quadrado e card wide
      6. skeleton.css   loader de placeholder
      7. modals.css     overlays, sheets, modal de detalhes e de opções
      8. cart.css       itens, controles, pagamento, PIX e botão WhatsApp
      9. ui.css         botão flutuante e toast
  -->
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/cards.css">
  <link rel="stylesheet" href="css/skeleton.css">
  <link rel="stylesheet" href="css/modals.css">
  <link rel="stylesheet" href="css/cart.css">
  <link rel="stylesheet" href="css/ui.css">

  <!-- Vercel Analytics (ativo automaticamente ao hospedar na Vercel) -->
  <script defer src="/_vercel/insights/script.js"></script>
</head>

<body>

  <!-- Header: logo + abas de navegação (preenchido por render.js) -->
  <header id="header"></header>

  <!-- Conteúdo: todas as seções renderizadas de uma vez (scroll contínuo) -->
  <main id="main"></main>

  <!-- Botão flutuante do carrinho -->
  <nav id="bottom-nav">
    <div class="cart-wrap">
      <button id="cart-btn">🛒</button>
      <span id="cart-count" class="hidden">0</span>
    </div>
  </nav>

  <!-- Overlays -->
  <div id="modal-overlay" class="overlay hidden"></div>
  <div id="cart-overlay" class="overlay hidden"></div>
  <div id="opcoes-overlay" class="overlay hidden"></div>

  <!-- Toast de feedback -->
  <div id="toast"></div>

  <!--
    ╔══════════════════════════════════════════════════════════╗
    ║  ORDEM DE CARREGAMENTO — NÃO ALTERAR                     ║
    ║                                                          ║
    ║  Dados (seções do cardápio)                              ║
    ║    data-especiais.js  → var DATA_ESPECIAIS               ║
    ║    data-porcoes.js    → var DATA_PORCOES                 ║
    ║    data-churrasco.js  → var DATA_CHURRASCO               ║
    ║    data-bebidas.js    → var DATA_BEBIDAS                 ║
    ║    data-alcool.js     → var DATA_ALCOOL                  ║
    ║                                                          ║
    ║  Registro + montagem do CARDAPIO                         ║
    ║    js/registry.js  → var CARDAPIO                        ║
    ║                                                          ║
    ║  Módulos JS (dependências primeiro)                      ║
    ║    js/utils.js   funções puras (sem DOM)                 ║
    ║    js/toast.js   feedback visual                         ║
    ║    js/modal.js   modal de detalhes                       ║
    ║    js/opcoes.js  modal de sub-opções                     ║
    ║    js/cart.js    estado e UI do carrinho                 ║
    ║    js/render.js  builders de card e render da página     ║
    ║                                                          ║
    ║  Templates e inicialização (carregados por último)       ║
    ║    whatsapp-message.js  template da mensagem             ║
    ║    js/init.js           event listeners + render()       ║
    ║                                                          ║
    ║  Para adicionar uma nova seção:                          ║
    ║    1. Crie data-novasecao.js na raiz                     ║
    ║    2. Adicione o <script> abaixo (antes de registry.js)  ║
    ║    3. Registre a variável em js/registry.js              ║
    ╚══════════════════════════════════════════════════════════╝
  -->

  <!-- Dados das seções -->
  <script src="data-especiais.js"></script>
  <script src="data-porcoes.js"></script>
  <script src="data-churrasco.js"></script>
  <script src="data-bebidas.js"></script>
  <script src="data-alcool.js"></script>

  <!-- Registro e montagem do CARDAPIO -->
  <script src="js/registry.js"></script>

  <!-- Módulos JS -->
  <script src="js/utils.js"></script>
  <script src="js/toast.js"></script>
  <script src="js/modal.js"></script>
  <script src="js/opcoes.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/render.js"></script>

  <!-- Template WhatsApp + inicialização -->
  <script src="whatsapp-message.js"></script>
  <script src="js/init.js"></script>

</body>

</html>
